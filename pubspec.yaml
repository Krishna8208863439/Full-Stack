name: texmill_erp
description: "TexMill Enterprise Weaving Mill ERP Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # Firebase Suite
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.0

  # UI, Typography & Visuals
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8

  # Reporting, Export & Barcode
  printing: ^5.13.0
  pdf: ^3.11.0
  excel: ^4.0.3
  csv: ^6.0.0
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0

  # Utilities & Storage
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
